[settings]
experimental = true
unix_default_inline_shell_args = "bash -c -o errexit -o pipefail -o nounset"

[tools]
gh = "2.96.0"
go = "1.26.5"
hadolint = "2.14.0"
jq = "1.8.2"
lefthook = "2.1.10"
node = "26.5.0"
oxfmt = "0.60.0"
regctl = "0.11.5"
shellcheck = "0.11.0"
yq = "4.53.3"
zizmor = "1.27.0"

[tasks.local-build]
description = "Build and test a variant locally"
usage = '''
arg "[variant]" help="variant (default: main)"
'''
run = '''
variant="${usage_variant:-main}"
docker buildx bake --no-cache --metadata-file .cache/docker-bake.json --set=*.output=type=docker --load "image-${variant}-local"
TEST_IMAGE="$(jq -r --arg target "image-${variant}-local" '.[$target]."image.name" | sub("^docker.io/library/"; "")' .cache/docker-bake.json)" VARIANT="$variant" go test -v ./tests/...
'''

[tasks.remote-build]
description = "Trigger a remote build"
usage = '''
arg "[variant]" help="variant (default: main)"
arg "[release]" help="release flag (default: false)"
'''
run = 'gh workflow run release.yaml -f variant="${usage_variant:-main}" -f release="${usage_release:-false}"'

[hooks]
postinstall = ["mkdir -p {{config_root}}/.cache", "lefthook install"]
